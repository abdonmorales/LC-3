name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-13
          - name: Windows
            os: windows-latest
          - name: Linux
            os: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            cmake \
            g++ \
            graphicsmagick \
            icnsutils \
            libfuse2 \
            xz-utils

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Yarn
        run: npm install --global yarn

      - name: Configure backend
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build backend
        run: cmake --build build --config Release --parallel

      - name: Install GUI dependencies
        working-directory: src/gui
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Rebuild native Electron module
        working-directory: src/gui
        env:
          CXXFLAGS: ${{ runner.os == 'Linux' && '-std=c++20' || '' }}
        run: yarn rebuild:native:release

      - name: Build renderer and main processes
        working-directory: src/gui
        run: yarn run pack

      - name: Package Electron app
        working-directory: src/gui
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false
        run: yarn electron-builder --publish never

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: lc3tools-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src/gui/build/*.AppImage
            src/gui/build/*.blockmap
            src/gui/build/*.dmg
            src/gui/build/*.exe
            src/gui/build/*.yml

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged apps
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/*
